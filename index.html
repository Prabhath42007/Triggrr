<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════════════
         PRIMARY META TAGS
         Update <title> and <description> if you ever rebrand.
    ═══════════════════════════════════════════════════ -->
    <title>Triggrr | Business Automations</title>
    <meta name="description"
          content="We automate the repetitive tasks eating your time — lead follow-ups, price monitoring, product listings, support tickets — so you can focus on growing your business. Python & AI automation agency, India." />
    <meta name="keywords"
          content="Python automation India, AI automation small business, WhatsApp automation, lead management automation, Amazon price monitoring, product listing automation, business automation Andhra Pradesh, Triggrr" />
    <meta name="author" content="Prabhath, Triggrr" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7C3AED" />

    <!-- ═══════════════════════════════════════════════════
         CANONICAL URL
         ↓ Replace triggrrtech.com once you have a domain.
           Also update og:url, og:image, twitter:image below.
    ═══════════════════════════════════════════════════ -->
    <link rel="canonical" href="https://triggrrtech.com/" />

    <!-- ═══════════════════════════════════════════════════
         OPEN GRAPH (Facebook · WhatsApp · LinkedIn previews)
         og:image → design a 1200×630px image using your
         banner from uploads, save as /public/og-image.png
    ═══════════════════════════════════════════════════ -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Triggrr" />
    <meta property="og:locale"      content="en_IN" />
    <meta property="og:title"
          content="Triggrr — Python & AI Automation for Small Businesses" />
    <meta property="og:description"
          content="Automate lead follow-ups, price monitoring, product listings, and support tickets. Python & AI automation for Indian small businesses." />
    <meta property="og:url"         content="https://triggrrtech.com/" />
    <meta property="og:image"       content="https://triggrrtech.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="Triggrr — Automate. Grow. Dominate." />

    <!-- ═══════════════════════════════════════════════════
         TWITTER / X CARD
         twitter:site uses your @TriggrrTech handle.
    ═══════════════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@TriggrrTech" />
    <meta name="twitter:creator"     content="@TriggrrTech" />
    <meta name="twitter:title"
          content="Triggrr — Python & AI Automation for Small Businesses" />
    <meta name="twitter:description"
          content="Automate your most time-consuming tasks with Python & AI. Built for Indian small businesses." />
    <meta name="twitter:image"      content="https://triggrrtech.com/og-image.png" />
    <meta name="twitter:image:alt"  content="Triggrr automation agency" />

    <!-- ═══════════════════════════════════════════════════
         FAVICON & APP ICONS
         Place your logo.png in /public/ folder.
         For a proper .ico, use https://favicon.io/favicon-converter/
    ═══════════════════════════════════════════════════ -->
    <link rel="icon"             type="image/png"  href="/logo.png" />
    <link rel="apple-touch-icon"                   href="/logo.png" />

    <!-- ═══════════════════════════════════════════════════
         FONT PRECONNECTS (performance — load before stylesheet)
    ═══════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Sora — your brand font from the demo scripts.
         Weights: 300 (light), 400 (regular), 500 (medium),
                  600 (semibold), 700 (bold), 800 (extrabold) -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" />

    <!-- ═══════════════════════════════════════════════════
         TABLER ICONS (web font — ti-* class icons)
         Used for service icons, nav icons, UI elements.

         ⚠️  CSP NOTE: Add to vercel.json → Content-Security-Policy:
             style-src: add  https://cdn.jsdelivr.net
             font-src:  add  https://cdn.jsdelivr.net
         Open vercel.json and append those two domains to
         their respective directives.
    ═══════════════════════════════════════════════════ -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-11WY8EZ6ZB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-11WY8EZ6ZB', {
        anonymize_ip:          true,   // GDPR-friendly
        send_page_view:        true,
        cookie_flags:          'SameSite=None;Secure',
      });
    </script>

    <!-- ═══════════════════════════════════════════════════
         STRUCTURED DATA (JSON-LD)
         Helps Google show your business info in search results.
         Update "url" and "email" once your domain is live.
         Docs: schema.org/ProfessionalService
    ═══════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Triggrr",
      "alternateName": "Triggrr Automation Agency",
      "description": "Python & AI automation agency for Indian small businesses. We automate lead management, price monitoring, product listings, and customer support.",
      "founder": {
        "@type": "Person",
        "name": "Prabhath",
        "jobTitle": "Founder & Python Automation Engineer"
      },
      "areaServed": "India",
      "email": "triggrr.tech@gmail.com",
      "url": "https://triggrrtech.com",
      "sameAs": [
        "https://www.instagram.com/triggrr.tech/",
        "https://x.com/TriggrrTech",
        "https://www.linkedin.com/company/triggrr-tech/",
        "https://www.youtube.com/@Triggrr-tech"
      ],
      "serviceType": [
        "Python Automation",
        "AI Automation",
        "Lead Management Automation",
        "Price Monitoring System",
        "AI Product Listing Engine",
        "AI Review Mining",
        "Customer Support Triage"
      ],
      "knowsAbout": ["Python", "AI", "n8n", "Claude AI", "Business Process Automation"]
    }
    </script>
  </head>

  <body>
    <!-- React mounts here. Do not add content inside this div. -->
    <div id="root"></div>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
